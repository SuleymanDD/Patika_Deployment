apiVersion: apps/v1
kind: ReplicaSet
metadata: 
  name: hello-rs
spec: 
  replicas: 5
  selector: 
    matchLabels: 
      app: hello-rs
  template: 
    metadata: 
      labels: 
        app: hello-rs
        environment: dev
    spec: 
      containers: 
        - image: cilium/echoserver:1.10.3
          name: hello-rs
          ports: 
            - containerPort: 8080


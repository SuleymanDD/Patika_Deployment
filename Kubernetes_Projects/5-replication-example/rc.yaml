apiVersion: v1
kind: ReplicationController
metadata: 
  name: hello-rc
spec: 
  replicas: 2
  selector:
    app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
      - name: hello-pod
        image: cilium/echoserver:1.10.3
        ports:
        - containerPort: 8080

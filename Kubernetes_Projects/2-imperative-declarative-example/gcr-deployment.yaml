  
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcr0-deployment
  labels:
    app: gcr0-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gcr0
  template:
    metadata:
      labels:
        app: gcr0
    spec:
      containers:
      - name: gcr
        image: cilium/echoserver:1.10.3
        ports:
        - containerPort: 8080